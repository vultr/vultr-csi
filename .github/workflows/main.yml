name: Tagged Release

on:
  push:
   tags: v*

jobs:
  report:
    name: Report
    runs-on: ubuntu-latest
    steps:
    - name: ref
      run: echo ${{ github.ref }}
    - name: event_name
      run: echo ${{ github.event_name }}
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: "1.26"
    - name: Get the version
      id: get_version
      run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT
    - name: hub login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
    - name: deploy
      run: REGISTRY=vultr VERSION=${{ steps.get_version.outputs.VERSION }} make deploy
    - uses: mattermost/action-mattermost-notify@2.0.0
      env:
        MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
        MATTERMOST_USERNAME:   ${{ secrets.MATTERMOST_USERNAME }}
        MATTERMOST_ICON:       ${{ secrets.MATTERMOST_ICON }}
        TEXT:                  "${{ github.repository }} : Release https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"